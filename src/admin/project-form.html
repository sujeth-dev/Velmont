<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200" />
    <title>Add Project — Velmont Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="../css/admin.css" />
  </head>
  <body>
    <header class="adm-header">
      <span class="adm-header__brand">Velmont Admin</span>
      <nav class="adm-header__nav">
        <a href="/admin/dashboard" class="adm-nav-link">Projects</a>
        <button class="adm-btn adm-btn--ghost" type="button" data-logout>Sign out</button>
      </nav>
    </header>

    <main class="adm-main" data-page="admin-project-form">
      <a class="adm-back" href="/admin/dashboard">← Back to Projects</a>
      <div class="adm-toolbar">
        <h2 class="adm-page-title">Add Project</h2>
      </div>

      <form class="adm-form adm-form--wide" data-project-form novalidate>
        <p class="adm-section-title">Basic Info</p>
        <div class="adm-fieldset">
          <div class="adm-field adm-field--full">
            <label class="adm-label" for="title">Title *</label>
            <input class="adm-input" id="title" name="title" type="text" required />
            <span class="adm-field__error" data-err="title"></span>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="discipline">Discipline *</label>
            <select class="adm-select" id="discipline" name="discipline" required>
              <option value="">Select…</option>
              <option value="Hospitality">Hospitality</option>
              <option value="Workplace">Workplace</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Commercial">Commercial</option>
            </select>
            <span class="adm-field__error" data-err="discipline"></span>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="location">Location *</label>
            <input class="adm-input" id="location" name="location" type="text" required />
            <span class="adm-field__error" data-err="location"></span>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="year">Year *</label>
            <input
              class="adm-input"
              id="year"
              name="year"
              type="number"
              min="2000"
              max="2099"
              required
            />
            <span class="adm-field__error" data-err="year"></span>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="area">Area</label>
            <input
              class="adm-input"
              id="area"
              name="area"
              type="text"
              placeholder="e.g. 35,000 sq ft"
            />
          </div>

          <div class="adm-field">
            <label class="adm-label" for="scope">Scope</label>
            <input
              class="adm-input"
              id="scope"
              name="scope"
              type="text"
              placeholder="e.g. Turnkey Interior Fit-Out"
            />
          </div>
        </div>

        <p class="adm-section-title">Content</p>
        <div class="adm-form" style="gap: 16px">
          <div class="adm-field">
            <label class="adm-label" for="lead">Editorial Lead *</label>
            <textarea
              class="adm-textarea adm-textarea--tall"
              id="lead"
              name="lead"
              required
            ></textarea>
            <span class="adm-field__error" data-err="lead"></span>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="body0">Body Paragraph 1 *</label>
            <textarea
              class="adm-textarea adm-textarea--tall"
              id="body0"
              name="body0"
              required
            ></textarea>
            <span class="adm-field__error" data-err="body0"></span>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="body1">Body Paragraph 2</label>
            <textarea class="adm-textarea" id="body1" name="body1"></textarea>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="body2">Body Paragraph 3</label>
            <textarea class="adm-textarea" id="body2" name="body2"></textarea>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="materials">Materials (comma-separated)</label>
            <input
              class="adm-input"
              id="materials"
              name="materials"
              type="text"
              placeholder="Custom Joinery, Solid Timber, Stone"
            />
          </div>
        </div>

        <p class="adm-section-title">Flags</p>
        <div class="adm-fieldset">
          <div class="adm-field">
            <div class="adm-toggle-wrap">
              <input class="adm-toggle" id="published" name="published" type="checkbox" />
              <label class="adm-toggle-label" for="published">Published (visible on site)</label>
            </div>
          </div>
          <div class="adm-field">
            <div class="adm-toggle-wrap">
              <input class="adm-toggle" id="featured" name="featured" type="checkbox" />
              <label class="adm-toggle-label" for="featured">Featured (shown in home strip)</label>
            </div>
          </div>
        </div>

        <p class="adm-section-title">Images</p>
        <div class="adm-fieldset">
          <div class="adm-field">
            <label class="adm-label" for="img-cover">Cover Image</label>
            <img class="adm-file-preview" data-preview="cover" alt="Cover preview" />
            <input
              class="adm-input"
              id="img-cover"
              name="img-cover"
              type="file"
              accept="image/*"
              data-img-slot="cover"
            />
          </div>
          <div class="adm-field">
            <label class="adm-label" for="img-hero">Hero Image</label>
            <img class="adm-file-preview" data-preview="hero" alt="Hero preview" />
            <input
              class="adm-input"
              id="img-hero"
              name="img-hero"
              type="file"
              accept="image/*"
              data-img-slot="hero"
            />
          </div>
          <div class="adm-field">
            <label class="adm-label" for="img-g0">Gallery Image 1</label>
            <img class="adm-file-preview" data-preview="gallery-0" alt="Gallery 1 preview" />
            <input
              class="adm-input"
              id="img-g0"
              name="img-g0"
              type="file"
              accept="image/*"
              data-img-slot="gallery-0"
            />
          </div>
          <div class="adm-field">
            <label class="adm-label" for="img-g1">Gallery Image 2</label>
            <img class="adm-file-preview" data-preview="gallery-1" alt="Gallery 2 preview" />
            <input
              class="adm-input"
              id="img-g1"
              name="img-g1"
              type="file"
              accept="image/*"
              data-img-slot="gallery-1"
            />
          </div>
          <div class="adm-field">
            <label class="adm-label" for="img-g2">Gallery Image 3</label>
            <img class="adm-file-preview" data-preview="gallery-2" alt="Gallery 3 preview" />
            <input
              class="adm-input"
              id="img-g2"
              name="img-g2"
              type="file"
              accept="image/*"
              data-img-slot="gallery-2"
            />
          </div>
          <div class="adm-field">
            <label class="adm-label" for="img-g3">Gallery Image 4</label>
            <img class="adm-file-preview" data-preview="gallery-3" alt="Gallery 4 preview" />
            <input
              class="adm-input"
              id="img-g3"
              name="img-g3"
              type="file"
              accept="image/*"
              data-img-slot="gallery-3"
            />
          </div>
          <div class="adm-field">
            <label class="adm-label" for="img-g4">Gallery Image 5</label>
            <img class="adm-file-preview" data-preview="gallery-4" alt="Gallery 5 preview" />
            <input
              class="adm-input"
              id="img-g4"
              name="img-g4"
              type="file"
              accept="image/*"
              data-img-slot="gallery-4"
            />
          </div>
        </div>

        <div id="form-status"></div>

        <div class="adm-form-actions">
          <button class="adm-btn adm-btn--primary" type="submit" data-form-submit>
            Save Project
          </button>
          <a class="adm-btn adm-btn--ghost" href="/admin/dashboard">Cancel</a>
        </div>
      </form>
    </main>

    <script type="module" src="../js/admin.js"></script>
  </body>
</html>
