<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200" />
    <title>Login — Velmont Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500;600&display=swap"
    />
    <link rel="stylesheet" href="../css/admin.css" />
  </head>
  <body>
    <main class="adm-login" data-page="admin-login">
      <!-- Brand panel -->
      <div class="adm-login__brand">
        <p class="adm-login__logo">V<span>.</span></p>
        <p class="adm-login__brand-name">Velmont</p>
        <p class="adm-login__brand-sub">Admin Portal</p>
      </div>

      <!-- Form panel -->
      <div class="adm-login__panel">
        <h1 class="adm-login__heading">Welcome back</h1>
        <p class="adm-login__sub">Sign in to manage projects and content.</p>

        <form class="adm-form" data-login-form novalidate>
          <div class="adm-field">
            <label class="adm-label" for="email">Email</label>
            <input
              class="adm-input"
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="adm-field">
            <label class="adm-label" for="password">Password</label>
            <input
              class="adm-input"
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            />
          </div>

          <p class="adm-error" data-login-error hidden></p>

          <button
            class="adm-btn adm-btn--dark"
            type="submit"
            data-login-submit
            style="
              width: 100%;
              justify-content: center;
              padding: 11px 16px;
              font-size: 14px;
              margin-top: 4px;
            "
          >
            Sign in
          </button>
        </form>
      </div>
    </main>

    <script type="module" src="../js/admin.js"></script>
  </body>
</html>
